# AWS App Runner build/run configuration per il backend Fastify.
#
# Le env-var (REDIS_URL, RPC_URL, JWT_SECRET, ecc.) NON vanno qui:
# si configurano nella service config di App Runner, sono cifrate a riposo
# e iniettate nel container in fase di run.

version: 1.0
runtime: nodejs20

build:
  commands:
    build:
      - npm ci --omit=dev

run:
  runtime-version: 20
  command: node src/server.js
  network:
    port: 3001
    env: PORT
  env:
    - name: NODE_ENV
      value: production
